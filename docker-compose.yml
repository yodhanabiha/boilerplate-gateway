services:
  api:
    build: .
    image: fintools-api:local
    container_name: fintools-api-local
    env_file: .env
    ports:
      - "4001:4000"
      - "5001:5000"
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4001/health', r => process.exit(r.statusCode===200?0:1)).on('error', ()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
